<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

     <!-- SEO Meta Tags -->
     <meta name="description" content="Aria is a business focused HTML landing page template built with Bootstrap to help you create lead generation websites for companies and their services.">
     <meta name="author" content="Inovatik">

     <!-- OG Meta Tags to improve the way the post looks when you share the page on LinkedIn, Facebook, Google+ -->
     <meta property="og:site_name" content="" /> <!-- website name -->
     <meta property="og:site" content="" /> <!-- website link -->
     <meta property="og:title" content=""/> <!-- title shown in the actual shared post -->
     <meta property="og:description" content="" /> <!-- description shown in the actual shared post -->
     <meta property="og:image" content="" /> <!-- image link, make sure it's jpg -->
     <meta property="og:url" content="" /> <!-- where do you want your post to link to -->
     <meta property="og:type" content="article" />

     <!-- Website Title -->
     <title>
          {% block title %}
          {% endblock title %}
     </title>

     <!-- Styles -->
     <link href="https://fonts.googleapis.com/css?family=Montserrat:500,700&display=swap&subset=latin-ext" rel="stylesheet">
     <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,400i,600&display=swap&subset=latin-ext" rel="stylesheet">
     <link href="{% static 'css/bootstrap.css' %}" rel="stylesheet">
     <link href="{% static 'css/fontawesome-all.css' %}" rel="stylesheet">
     <link href="{% static 'css/swiper.css' %}" rel="stylesheet">
     <link href="{% static 'css/magnific-popup.css' %}" rel="stylesheet">
     <link href="{% static 'css/styles.css' %}" rel="stylesheet">

     <!-- Favicon  -->
     <link rel="icon" href="{% static 'images/favicon.png' %}">
</head>
<body data-spy="scroll" data-target=".fixed-top">

     <!-- Preloader -->
     <div class="spinner-wrapper">
          <div class="spinner">
               <div class="bounce1"></div>
               <div class="bounce2"></div>
               <div class="bounce3"></div>
          </div>
     </div>
     <!-- end of preloader -->


     <!-- Navbar -->
     <nav class="navbar navbar-expand-md navbar-dark navbar-custom fixed-top">
          <!-- Text Logo - Use this if you don't have a graphic logo -->
          <!-- <a class="navbar-brand logo-text page-scroll" href="index.html">Aria</a> -->

          <!-- Image Logo -->
          <a class="navbar-brand logo-image" href="/"><img src="{% static 'images/logo.svg' %}" alt="alternative"></a>
          
          <!-- Mobile Menu Toggle Button -->
          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarsExampleDefault" aria-controls="navbarsExampleDefault" aria-expanded="false" aria-label="Toggle navigation">
               <span class="navbar-toggler-awesome fas fa-bars"></span>
               <span class="navbar-toggler-awesome fas fa-times"></span>
          </button>
          <!-- end of mobile menu toggle button -->

          <div class="collapse navbar-collapse" id="navbarsExampleDefault">
               <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                    <a class="nav-link page-scroll" href="#header">HOME <span class="sr-only">(current)</span></a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link page-scroll" href="#intro">INTRO</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link page-scroll" href="#services">SERVICES</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link page-scroll" href="#callMe">CALL ME</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link page-scroll" href="#projects">PROJECTS</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link page-scroll" href="#contact">CONTACT</a>
                    </li>
               </ul>
                    <style>
                    .sign-in-link {
                         color: white;               /* Asl rangi */
                         text-decoration: none;      /* Tagidagi chiziqni olib tashlash */
                         font-weight: 600;
                         font-size: 16px;
                         text-transform: uppercase;  /* Bosh harflarda (xohlasangiz olib tashlang) */
                         transition: all 0.3s ease;  /* Hover effekti yumshoq bo'lishi uchun */
                         display: inline-block;
                         padding: 5px 10px;
                    }

                    .sign-in-link:hover {
                         color: #1de9b6;             /* Ustiga borganda chiqadigan rang (Home rangi bilan bir xil) */
                         transform: translateY(-2px); /* Biroz yuqoriga ko'tarilish effekti */
                         text-shadow: 0px 0px 8px rgba(29, 233, 182, 0.5); /* Mayin nur sochishi */
                    }
                    </style>

                    <span class="nav-item">
                    <a href="/login" class="sign-in-link">
                         Sign In
                    </a>
                    </span>
          </div>
     </nav> <!-- end of navbar -->
     <!-- end of navbar -->


     <!-- Header -->
     <header id="header" class="header" style="background-image: url('{% if contact_us and contact_us.image %}{{ contact_us.image.url }}{% else %}{% static "images/header-background.jpg" %}{% endif %}');">
          <div class="header-content">
               <div class="container">
                    <div class="row">
                    <div class="col-lg-12">
                         <div class="text-container">
                              <h1><span id="js-rotating">{{ contact_us.name }}</span></h1>
                         </div>
                    </div> <!-- end of col -->
                    </div> <!-- end of row -->
               </div> <!-- end of container -->
          </div> <!-- end of header-content -->
     </header> <!-- end of header -->
     <!-- end of header -->





     {% block content %}
     {% endblock content %}



<!-- Footer -->
<div class="footer">
     <div class="container">
     </div> <!-- end of container -->
</div> <!-- end of footer -->  
<!-- end of footer -->


<!-- Scripts -->
<script src="{% static 'js/jquery.min.js' %}"></script> <!-- jQuery for Bootstrap's JavaScript plugins -->
<script src="{% static 'js/popper.min.js' %}"></script> <!-- Popper tooltip library for Bootstrap -->
<script src="{% static 'js/bootstrap.min.js' %}"></script> <!-- Bootstrap framework -->
<script src="{% static 'js/jquery.easing.min.js' %}"></script> <!-- jQuery Easing for smooth scrolling between anchors -->
<script src="{% static 'js/swiper.min.js' %}"></script> <!-- Swiper for image and text sliders -->
<script src="{% static 'js/jquery.magnific-popup.js' %}"></script> <!-- Magnific Popup for lightboxes -->
<script src="{% static 'js/morphext.min.js' %}"></script> <!-- Morphtext rotating text in the header -->
<script src="{% static 'js/isotope.pkgd.min.js' %}"></script> <!-- Isotope for filter -->
<script src="{% static 'js/validator.min.js' %}"></script> <!-- Validator.js - Bootstrap plugin that validates forms -->
<script src="{% static 'js/scripts.js' %}"></script> <!-- Custom scripts -->
<script src="https://cdn.tiny.cloud/1/SIZNING_KALITINGIZ/tinymce/6/tinymce.min.js"></script>

     {% block scripts %}
     {% endblock scripts %}
</body>
</html>
