{% extends "base.html" %}
{% load static %}

{% block title %}Login{% endblock title %}

{% block content %}
<style>
     .auth-card {
          max-width: 520px;
          margin: 4rem auto 2rem;
          background: #fff;
          border-radius: 1rem;
          box-shadow: 0 14px 40px rgba(0,0,0,0.12);
          padding: 2.25rem;
     }
     .step-label {
          font-weight: 700;
          color: #0f3f4c;
          margin-bottom: 0.75rem;
     }
</style>

<div class="container">
     <div class="auth-card">
          <h2 class="text-center" style="color:#0f3f4c;">Kirish</h2>
          <p class="text-center">Email emas, ism va familyani qanday yozgan bo‘lsangiz shunday kiriting, keyin parolni kiriting.</p>

          <form method="post" style="margin-top:1.5rem;">
               {% csrf_token %}
               <div class="form-group">
                    <label class="step-label" for="ism">Ism</label>
                    <input type="text" class="form-control-input" id="ism" name="ism" required>
               </div>
               <div class="form-group">
                    <label class="step-label" for="familya">Familya</label>
                    <input type="text" class="form-control-input" id="familya" name="familya" required>
               </div>
               <div class="form-group">
                    <label class="step-label" for="password">Parol</label>
                    <input type="password" class="form-control-input" id="password" name="password" required>
               </div>
               <div class="form-group">
                    <button type="submit" class="btn-solid-reg" style="width:100%;">Kirish</button>
               </div>
          </form>
     </div>
</div>
{% endblock content %}
